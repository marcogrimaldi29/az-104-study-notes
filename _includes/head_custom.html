<!-- _includes/head_custom.html -->
<!-- Injected into every page <head> by Just the Docs -->

<!-- ── Open Graph / Social sharing meta ─────────────────── -->
<meta property="og:site_name" content="{{ site.title }}">
{% if page.title %}
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
{% else %}
  <meta property="og:title" content="{{ site.title }}">
{% endif %}
{% if page.description %}
  <meta property="og:description" content="{{ page.description }}">
{% else %}
  <meta property="og:description" content="{{ site.description }}">
{% endif %}
<meta property="og:type" content="website">
<meta name="twitter:card"        content="summary">
<meta name="twitter:title"       content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<link rel="author" href="{{ site.personal_site_url }}">

<!-- ── Study-optimised custom styles ────────────────────── -->
<style>
  /*
   * AZ-104 colour palette — warm brown / earthy tones
   *
   * Primary accent  : #9C6B3F  (walnut brown)
   * Light accent    : #D4A574  (caramel / tan)
   * Caveat border   : #C8956C  (terracotta)
   * Caveat bg       : rgba(200, 149, 108, 0.08)
   * Warning border  : #C97B5A  (burnt sienna)
   * Warning bg      : rgba(201, 123, 90, 0.08)
   * Table hover     : rgba(156, 107, 63, 0.10)
   * SLA highlight   : #D4A574  (caramel)
   * h3 heading      : #C8A882  (warm sand)
   * Mermaid border  : rgba(212, 165, 116, 0.20)
   * Domain badge bg : #7B4F2E  (dark walnut)
   */

  /* ── Exam Caveat callout ─────────────────────────────── */
  blockquote strong:first-child,
  blockquote p:first-child strong:first-child {
    display: inline-block;
  }

  /* Coloured left-border callout shorthand via blockquote */
  .warning-box {
    border-left:   4px solid #C97B5A;
    background:    rgba(201, 123, 90, 0.08);
    padding:       0.6rem 1rem;
    margin:        1rem 0;
    border-radius: 0 6px 6px 0;
  }

  /* ── Tables ─────────────────────────────────────────── */
  /* Make all tables scroll horizontally on small screens  */
  .main-content table {
    display:    block;
    width:      100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-collapse: collapse;
    font-size:  0.875rem;
  }

  .main-content table th {
    background:     var(--sidebar-color);
    position:       sticky;
    top:            0;
    font-weight:    700;
    letter-spacing: 0.03em;
    padding:        0.55rem 0.8rem;
    white-space:    nowrap;
  }

  .main-content table td {
    padding:     0.45rem 0.8rem;
    min-width:   80px;
    line-height: 1.4;
  }

  /* Zebra striping */
  .main-content table tbody tr:nth-child(even) {
    background: rgba(255, 255, 255, 0.03);
  }

  .main-content table tbody tr:hover {
    background: rgba(156, 107, 63, 0.10);   /* warm brown tint */
  }

  /* ── Mermaid diagrams ────────────────────────────────── */
  .main-content .mermaid {
    margin:        1.5rem auto;
    padding:       1rem;
    background:    rgba(35, 25, 15, 0.50);  /* very dark warm brown */
    border:        1px solid rgba(212, 165, 116, 0.20);
    border-radius: 8px;
    overflow-x:    auto;
    text-align:    center;
  }

  /* Ensure diagram text is readable on the dark background */
  .main-content .mermaid svg text {
    fill: #f0e6d8 !important;              /* warm off-white */
  }

  /* ── Code blocks ─────────────────────────────────────── */
  .main-content .highlight {
    border-radius: 6px;
    font-size:     0.82rem;
  }

  .main-content code {
    font-size:     0.84em;
    padding:       0.15em 0.4em;
    border-radius: 4px;
  }

  /* ── SLA / emphasis in tables ───────────────────────── */
  /* Bold values stand out in warm caramel instead of blue */
  .main-content table td strong {
    color: #D4A574;                        /* caramel */
  }

  /* ── Domain weight badges in nav ─────────────────────── */
  .nav-list-item .nav-list-link::after {
    font-size: 0.72em;
    opacity:   0.6;
  }

  /* ── Headings spacing ───────────────────────────────── */
  .main-content h2 {
    margin-top:  2rem;
    padding-top: 0.5rem;
    border-top:  1px solid rgba(212, 165, 116, 0.15);  /* warm sand rule */
  }

  .main-content h3 {
    margin-top: 1.5rem;
    color:      #C8A882;                   /* warm sand */
  }

  /* ── Scenario quick-reference tables ────────────────── */
  .main-content table td:last-child {
    font-weight: 500;
  }

  /* ── Exam-caveats blockquote styling ─────────────────── */
  .main-content blockquote {
    border-left:   4px solid #C8956C;      /* terracotta */
    background:    rgba(200, 149, 108, 0.08);
    padding:       0.6rem 1rem;
    border-radius: 0 6px 6px 0;
    font-size:     0.92rem;
  }

  .main-content blockquote p {
    margin: 0;
  }

  /* ── Page breadcrumb / domain weight tag ─────────────── */
  .domain-badge {
    display:        inline-block;
    background:     #7B4F2E;              /* dark walnut */
    color:          #F0E6D8;             /* warm off-white text */
    font-size:      0.75rem;
    font-weight:    700;
    padding:        0.2rem 0.6rem;
    border-radius:  20px;
    margin-left:    0.5rem;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }

  /* ── Print styles ────────────────────────────────────── */
  @media print {
    .side-bar, .site-header, .site-footer,
    .main-header, #back-to-top { display: none !important; }
    .main-content-wrap { max-width: 100% !important; }
    .main-content { font-size: 10pt; }
    .mermaid svg  { max-width: 100%; }
    table         { font-size: 8pt; }
  }

  /* ── Responsive tweaks ───────────────────────────────── */
  @media (max-width: 800px) {
    .main-content table {
      font-size: 0.78rem;
    }
    .main-content table td,
    .main-content table th {
      padding:   0.35rem 0.5rem;
      min-width: 60px;
    }
  }
</style>

<!-- External links in new tabs -->
<script>
(function() {
  document.addEventListener("DOMContentLoaded", function() {
    const currentHost = window.location.hostname;
    document.querySelectorAll("a[href]").forEach(link => {
      if (link.hostname && link.hostname !== currentHost) {
        link.setAttribute("target", "_blank");
        link.setAttribute("rel", "noopener noreferrer");
      }
    });
  });
})();
</script>
